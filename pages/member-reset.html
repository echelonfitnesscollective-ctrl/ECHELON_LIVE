<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
    <title>Echelon Fitness Collective | Set Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/main.js" defer></script>
    <script src="../assets/js/member-auth.js" defer></script>
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="../index.html" class="logo">ECHELON <span>FITNESS COLLECTIVE</span></a>
            <nav class="desktop-nav">
                <a href="../index.html#about">About</a>
                <a href="../index.html#training">Training</a>
                <a href="../index.html#resources">Resources</a>
                <a href="../index.html#shop">Shop</a>
                <a href="../index.html#contact">Contact</a>
            </nav>
            <button class="mobile-toggle" aria-label="Open Menu">☰</button>
        </div>
    </header>

    <main class="portal-section member-access-page">
        <div class="container">
            <div class="portal-card member-access-card">
                <span class="checkin-tag">MEMBER ACCESS</span>
                <h1>SET YOUR PASSWORD</h1>

                <form id="password-reset-request-form" class="echelon-form">
                    <p>Enter the email address connected to your Echelon membership. We’ll send a secure password link.</p>
                    <label for="password-reset-email">EMAIL ADDRESS</label>
                    <input id="password-reset-email" name="email" type="email" autocomplete="email" required>
                    <button type="submit" class="btn-primary">SEND PASSWORD LINK</button>
                    <p id="password-reset-request-feedback" class="form-error" role="status"></p>
                </form>

                <form id="password-reset-update-form" class="echelon-form" hidden>
                    <p>Create a new password for your Echelon Member Portal.</p>
                    <label for="new-member-password">NEW PASSWORD</label>
                    <input id="new-member-password" name="password" type="password" autocomplete="new-password" minlength="8" required>
                    <label for="confirm-member-password">CONFIRM NEW PASSWORD</label>
                    <input id="confirm-member-password" name="password_confirmation" type="password" autocomplete="new-password" minlength="8" required>
                    <button type="submit" class="btn-primary">SAVE PASSWORD</button>
                    <p id="password-reset-update-feedback" class="form-error" role="status"></p>
                </form>

                <a href="member-login.html" class="member-password-link">BACK TO MEMBER SIGN IN</a>
            </div>
        </div>
    </main>
</body>
</html>
